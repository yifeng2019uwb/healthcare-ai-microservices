server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: "${AUTH_SERVICE_URL:http://localhost:8082}"
          predicates:
            - Path=/api/auth/**
        - id: patient-service
          uri: "${PATIENT_SERVICE_URL:http://localhost:8081}"
          predicates:
            - Path=/api/patients/**
        - id: provider-service
          uri: "${PROVIDER_SERVICE_URL:http://localhost:8083}"
          predicates:
            - Path=/api/provider/**
        - id: provider-admin
          uri: "${PROVIDER_SERVICE_URL:http://localhost:8083}"
          predicates:
            - Path=/api/admin/**
        - id: encounter-service
          uri: "${APPOINTMENT_SERVICE_URL:http://localhost:8084}"
          predicates:
            - Path=/api/encounters/**
        - id: ai-service
          uri: "${AI_SERVICE_URL:http://localhost:8085}"
          predicates:
            - Path=/api/ai/**

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health

gateway:
  auth-service-url: "${AUTH_SERVICE_URL:http://localhost:8082}"
  jwks-refresh-interval-minutes: 5
  public-paths:
    - /api/auth/register/patient
    - /api/auth/register/provider
    - /api/auth/login
    - /api/auth/refresh
    - /actuator/health
  role-paths:
    "[/api/patients/]": PATIENT
    "[/api/provider/]": PROVIDER
    "[/api/admin/]": ADMIN
    "[/api/encounters/me/]": PATIENT
    "[/api/encounters/provider/]": PROVIDER
    "[/api/ai/]": PROVIDER
