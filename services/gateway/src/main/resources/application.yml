server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: "${AUTH_SERVICE_URL:http://localhost:8082}"
          predicates:
            - Path=/api/auth/login, /api/auth/refresh, /api/auth/logout, /api/auth/register/patient, /api/auth/register/provider

        - id: provider-service
          uri: "${PROVIDER_SERVICE_URL:http://localhost:8083}"
          predicates:
            - Path=/api/provider/me, /api/provider/patients, /api/provider/patients/*, /api/provider/patients/*/conditions, /api/provider/patients/*/allergies, /api/provider/encounters/*/conditions, /api/provider/encounters/*/allergies

        - id: provider-admin
          uri: "${PROVIDER_SERVICE_URL:http://localhost:8083}"
          predicates:
            - Path=/api/admin/import/organizations, /api/admin/import/patients, /api/admin/import/providers, /api/admin/import/encounters, /api/admin/import/conditions, /api/admin/import/allergies

        - id: encounter-service
          uri: "${APPOINTMENT_SERVICE_URL:http://localhost:8084}"
          predicates:
            - Path=/api/encounters/me, /api/encounters/me/*, /api/encounters/provider, /api/encounters/provider/*, /api/encounters/provider/patients/*

        - id: ai-service
          uri: "${AI_SERVICE_URL:http://localhost:8085}"
          predicates:
            - Path=/api/ai/encounters/*/request, /api/ai/patient/*, /api/ai/patient/*/history

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health

gateway:
  auth-service-url: "${AUTH_SERVICE_URL:http://localhost:8082}"
  jwks-refresh-interval-minutes: 5
  public-paths:
    - /api/auth/register/patient
    - /api/auth/register/provider
    - /api/auth/login
    - /api/auth/refresh
    - /actuator/health
  role-paths:
    "[/api/provider/]": PROVIDER
    "[/api/admin/]": ADMIN
    "[/api/encounters/me/]": PATIENT
    "[/api/encounters/provider/]": PROVIDER
    "[/api/ai/]": PROVIDER
