name: Healthcare AI Microservices CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ── 1. Structure check (no Java needed) ────────────────────────────────────
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Validate project structure
        run: |
          for dir in docs healthcare-infra services services/shared; do
            [ -d "$dir" ] || { echo "Missing directory: $dir"; exit 1; }
          done
          for file in services/shared/pom.xml services/dev.sh README.md .gitignore; do
            [ -f "$file" ] || { echo "Missing file: $file"; exit 1; }
          done
          echo "Project structure OK"

  # ── 2. Shared module (all other jobs depend on this) ───────────────────────
  test-shared:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install parent POM
        run: cd services && mvn install -N -q

      - name: Test shared module with coverage
        run: cd services/shared && mvn test jacoco:report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shared-coverage
          path: services/shared/target/site/jacoco/

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const p = 'services/shared/target/site/jacoco/index.html';
            if (!fs.existsSync(p)) return;
            const html = fs.readFileSync(p, 'utf8');
            const pct = (html.match(/Total.*?ctr2">(\d+)%/) || [, 'N/A'])[1];
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Shared Module Coverage\nTotal: **${pct}%**\n[Full Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

  # ── 3. Auth service ────────────────────────────────────────────────────────
  test-auth-service:
    runs-on: ubuntu-latest
    needs: test-shared
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install parent POM and shared
        run: |
          cd services
          mvn install -N -q
          cd shared && mvn install -q

      - name: Test auth-service
        run: cd services/auth-service && mvn test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-service-test-results
          path: services/auth-service/target/surefire-reports/

  # ── 4. Gateway (skeleton — allowed to fail) ────────────────────────────────
  test-gateway:
    runs-on: ubuntu-latest
    needs: test-shared
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install parent POM and shared
        run: |
          cd services
          mvn install -N -q
          cd shared && mvn install -q

      - name: Test gateway
        run: cd services/gateway && mvn test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gateway-test-results
          path: services/gateway/target/surefire-reports/

  # ── 5. Patient service (skeleton — allowed to fail) ────────────────────────
  test-patient-service:
    runs-on: ubuntu-latest
    needs: test-shared
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install parent POM and shared
        run: |
          cd services
          mvn install -N -q
          cd shared && mvn install -q

      - name: Test patient-service
        run: cd services/patient-service && mvn test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patient-service-test-results
          path: services/patient-service/target/surefire-reports/
